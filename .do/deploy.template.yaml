spec:
  name: ttue
  services:
  - name: app
    source_dir: .
    dockerfile_path: backend/Dockerfile
    github:
      repo: Hadroon/ttue
      branch: develop
      deploy_on_push: true
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
    - path: /
    envs:
    - key: NODE_ENV
      value: production

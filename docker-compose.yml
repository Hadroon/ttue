version: "3.9"

services:
  app:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - NODE_ENV=development
      - PORT=3000
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - ./backend/src:/app/src  # Hot reload for backend changes
      # Frontend changes require rebuild since it's compiled into the image

<header class="site-header" role="banner">
  <div class="container header-inner">
    <a class="brand" routerLink="/">
      <!-- <span class="brand-logo" aria-hidden="true">⚖️</span> -->
      <img style="width: 33px;" src="/favicon.png" alt="" class="brand-logo" aria-hidden="true" />
      <span class="brand-text">Time to unite Earth</span>
    </a>

    <nav class="main-nav" aria-label="Primary">
      <a href="/challenges">Challenges</a>
      <!-- <a href="/test">Test</a> -->
      <!-- <a href="#proposals">Explore Laws</a> -->
      <a routerLink="/how-it-works">How it works</a>
      <a routerLink="/article-workbench">Workbench</a>
      <a href="#about">About</a>
    </nav>

    <div class="header-cta">
      @if (!authService.isLoggedIn()) {
        <a class="btn ghost" href="#signin" (click)="openSignInModal(); $event.preventDefault()">Sign in</a>
      } @else {
        <span class="user-greeting">Hi, {{ authService.currentUser()?.displayName || authService.currentUser()?.username }}</span>
        @if (authService.isAdmin()) {
          <a class="btn ghost" routerLink="/admin">Admin</a>
        }
        <a class="btn ghost" (click)="logout()">Sign out</a>
      }
      <a class="btn primary" routerLink="/article-workbench">Create proposal</a>
    </div>

    <button class="hamburger" aria-label="Open menu" (click)="toggleNav()">☰</button>
  </div>
</header>

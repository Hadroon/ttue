<article class="challenge-card" [class.is-marked]="challenge().isMarked">
  @if (challenge().isMarked) {
    <div class="marked-banner">⚠ Reviewed by moderator</div>
  }
  <div class="challenge-vote">
    <button class="vote-btn-large" [class.voted]="challenge().voted" (click)="onVote()"
      [attr.aria-label]="'Vote for ' + challenge().title">
      <span class="vote-icon">▲</span>
      <span class="vote-count">{{ challenge().votes }}</span>
    </button>
  </div>
  <div class="challenge-content">
    <div class="challenge-header">
      <!-- <div class="challenge-meta">
        <span class="chip">{{ challenge.category }}</span>
        <span class="urgency-badge" [class]="getUrgencyClass(challenge.urgency)">
          {{ challenge.urgency }}
        </span>
      </div>
      <div class="challenge-header-right">
        @if (challenge.rewardPool) {
        <div class="reward-pool">{{ challenge.rewardPool }}</div>
        }
      </div> -->
    </div>

    <div class="challenge-body">
      <h3>{{ challenge().title }}</h3>
      <p class="challenge-description">{{ challenge().description }}</p>

      <!-- <div class="challenge-stats">
        <div class="stat-item">
          <span class="stat-icon">👥</span>
          <span>{{ challenge.participantCount }} participants</span>
        </div>
        <div class="stat-item">
          <span class="stat-icon">💡</span>
          <span>{{ ideasCount }} ideas</span>
        </div>
        @if (challenge.deadline) {
        <div class="stat-item">
          <span class="stat-icon">⏱️</span>
          <span>{{ formatDeadline(challenge.deadline) }}</span>
        </div>
        }
      </div> -->
      <div class="challenge-tags">
        @for (tag of challenge().tags; track tag) {
        <span class="tag">#{{ tag }}</span>
        }
      </div>
    </div>
    <div class="challenge-actions">
      <button class="btn secondary sm" (click)="navigateToWorkbench()">Explore Challenge</button>
      <a class="btn primary sm" [href]="'#join-' + challenge().id">Join challenge</a>
      <app-content-actions-menu
        contentType="challenge"
        [contentId]="challenge().id"
        [contentLabel]="challenge().title">
      </app-content-actions-menu>
    </div>
  </div>
</article>
